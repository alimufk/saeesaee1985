<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاركة تطبيق القرآن الكريم</title>
    <style>
        /* الألوان الزمردية والذهبية المتوافقة مع الوضع الليلي والنهاري */
        :root {
            --bg-color: #f4f7f5;
            --primary-color: #0c4a34; /* أخضر زمردي */
            --secondary-color: #d4af37; /* ذهبي */
            --btn-text: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a1812;
                --primary-color: #1b6347;
                --secondary-color: #f3cf65;
            }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* يجعل الزر في منتصف الشاشة تماماً */
        }

        /* تصميم زر المشاركة */
        .share-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 32px;
            background-color: var(--primary-color);
            color: var(--btn-text);
            border: 2px solid var(--secondary-color);
            border-radius: 50px; /* زوايا دائرية بالكامل */
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(12, 74, 52, 0.2);
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* أيقونة المشاركة */
        .share-button svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* تأثيرات الحركة عند تمرير الماوس أو الضغط */
        .share-button:hover {
            background-color: var(--secondary-color);
            color: #0c4a34;
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(212, 175, 55, 0.3);
        }

        .share-button:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <!-- الزر يظهر في وسط الصفحة -->
    <button id="shareBtn" class="share-button">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
        </svg>
        نشر ومشاركة التطبيق
    </button>

<script>
    document.getElementById('shareBtn').addEventListener('click', async () => {
        // نص ورابط المشاركة الذي سيظهر لأصدقائك
        const shareData = {
            title: 'تطبيق القرآن الكريم',
            text: 'الدال على الخير كفاعله، أنصحكم بتحميل تطبيق القرآن الكريم الفاخر بدون إعلانات.',
            url: 'https://play.google.com/store/apps/details?id=YOUR_APP_PACKAGE_NAME' // استبدل هذا برابط تطبيقك الحقيقي لاحقاً
        };

        // تشغيل نظام المشاركة الخاص بالهاتف
        if (navigator.share) {
            try {
                await navigator.share(shareData);
            } catch (err) {
                console.log('تم إلغاء المشاركة');
            }
        } else {
            // حل احتياطي إذا كان النظام قديم: يتم نسخ الرابط تلقائياً
            navigator.clipboard.writeText(shareData.url);
            alert('تم نسخ رابط التطبيق! يمكنك الآن إرساله لأي شخص.');
        }
    });
</script>

</body>
</html>
