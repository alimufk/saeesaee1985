<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاركة تطبيق القرآن الكريم</title>
    <style>
        :root {
            --bg-color: #f4f7f5;
            --card-bg: #ffffff;
            --primary-color: #0c4a34; /* أخضر زمردي غامق */
            --secondary-color: #d4af37; /* ذهبي */
            --text-color: #2d3748;
            --text-muted: #718096;
            --border-color: #e2e8f0;
            --shadow: 0 15px 35px rgba(12, 74, 52, 0.08);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a1812;
                --card-bg: #11251c;
                --primary-color: #1b6347;
                --secondary-color: #f3cf65;
                --text-color: #e2e8f0;
                --text-muted: #a0aec0;
                --border-color: #1f3a2f;
                --shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        /* زخرفة إسلامية في الأعلى */
        .ornament {
            height: 12px;
            background: repeating-linear-gradient(45deg, var(--primary-color), var(--primary-color) 10px, var(--secondary-color) 10px, var(--secondary-color) 20px);
            opacity: 0.8;
        }

        .content {
            padding: 40px 30px;
        }

        /* رمز زخرفي جمالي */
        .icon-wrapper {
            font-size: 3rem;
            color: var(--secondary-color);
            margin-bottom: 15px;
            line-height: 1;
        }

        h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* زر المشاركة الرئيسي الفاخر */
        .share-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 25px;
            background-color: var(--primary-color);
            color: #ffffff;
            border: 2px solid var(--secondary-color);
            border-radius: 50px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(12, 74, 52, 0.2);
            transition: all 0.3s ease;
        }

        .share-button svg {
            width: 22px;
            height: 22px;
        }

        .share-button:hover {
            background-color: var(--secondary-color);
            color: #0c4a34;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        }

        .share-button:active {
            transform: translateY(1px);
        }

        /* إشعار منبثق أنيق عند النسخ */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: var(--primary-color);
            color: #fff;
            border: 1px solid var(--secondary-color);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.95rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            .content { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
            p { font-size: 0.95rem; }
            .share-button { font-size: 1rem; padding: 14px 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="ornament"></div>
    
    <div class="content">
        <div class="icon-wrapper">❖</div>
        <h1>مشاركة الخير</h1>
        <p>ساهم في نشر كتاب الله "الدال على الخير كفاعله"، شارك تطبيق القرآن الكريم الآن مع عائلتك وأصدقائك.</p>
        
        <button id="shareBtn" class="share-button">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3"></circle>
                <circle cx="6" cy="12" r="3"></circle>
                <circle cx="18" cy="19" r="3"></circle>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
            </svg>
            مشاركة التطبيق الآن
        </button>

        <footer>
            <p>الدال على الخير كفاعله</p>
        </footer>
    </div>
</div>

<div id="toast" class="toast">تم نسخ رابط التطبيق بنجاح!</div>

<script>
    document.getElementById('shareBtn').addEventListener('click', async () => {
        // يمكنك تعديل نص الرسالة ورابط التطبيق من هنا
        const shareData = {
            title: 'تطبيق القرآن الكريم',
            text: 'أوصيكم بتحميل تطبيق القرآن الكريم - تجربة مميزة وخالية من الإعلانات ومصممة بأعلى جودة.',
            url: 'https://play.google.com/store/apps/details?id=https://github.com/alimufk/Quran-karim-/releases/download/v1.0.1/app-debug.apk' 
        };

        const toast = document.getElementById('toast');

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // استخدام نظام المشاركة الأصلي للهاتف إذا كان مدعوماً
        if (navigator.share) {
            try {
                await navigator.share(shareData);
            } catch (err) {
                console.log('تم إلغاء المشاركة:', err);
            }
        } else {
            // حل بديل ذكي: نسخ النص والرابط تلقائياً وإظهار تنبيه منبثق فخم
            try {
                await navigator.clipboard.writeText(shareData.text + '\\n' + shareData.url);
                showToast('تم نسخ نص ورابط المشاركة! يمكنك إرساله الآن.');
            } catch (err) {
                alert('رابط التطبيق: ' + shareData.url);
            }
        }
    });
</script>

</body>
</html>
